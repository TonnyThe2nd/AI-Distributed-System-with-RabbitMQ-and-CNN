services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    command: python worker/worker.py
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      PYTHONUNBUFFERED: "1"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      PYTHONPATH: /app
      TF_CPP_MIN_LOG_LEVEL: "2" 
    volumes:
      - .:/app

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    command: uvicorn api.api:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
      TF_CPP_MIN_LOG_LEVEL: "2" 
    volumes:
      - .:/app
  angular:
    build:
      context: ./frontend/cnn-fruits-classifier
      dockerfile: Dockerfile
    ports:
      - "4200:4200"
    volumes:
      - ./frontend/cnn-fruits-classifier:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development